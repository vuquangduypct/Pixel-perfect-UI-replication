<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Perfect UI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .custom-box {
            width: 225.15px; /* Rounded to 2 decimal places */
            height: 180.64px; /* Rounded to 2 decimal places */
            position: absolute;
            top: 588px;
            left: 880px;
            transform: rotate(11.57deg);
            opacity: 1;
            border-radius: 7px;
            background-color: #3498db; /* Example color */
            box-shadow: 5px 4px 4px 0px #00000040;
        }
    </style>
</head>
<body>
    <div class="custom-box"></div>
    <script src="script.js"></script>
</body>
</html>
